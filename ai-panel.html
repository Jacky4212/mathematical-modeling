<!-- AI Chat Panel — embed in each page before </body> -->
<style>
#ai-chat-panel{display:none;position:fixed;right:0;top:0;width:340px;height:100vh;z-index:140;flex-direction:column;background:var(--card-bg,#fef9ee);border-left:1px solid var(--card-border,#e5d5b5);box-shadow:-4px 0 24px rgba(0,0,0,.1)}
#ai-chat-panel .ac-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--card-border,#e5d5b5);background:linear-gradient(135deg,#1a3a5c,var(--accent,#2d7fc1));color:#fff;flex-shrink:0}
#ai-chat-panel .ac-header span{font-size:.95em;font-weight:700}
#ai-chat-panel .ac-header button{background:none;border:none;color:#fff;font-size:1.3em;cursor:pointer;padding:0 4px;line-height:1}
#ai-chat-panel .ac-cfg{padding:10px 14px;border-bottom:1px solid var(--divider,#d9c9a0);font-size:.78em;background:var(--paper-dark,#f3e8d0);flex-shrink:0}
#ai-chat-panel .ac-cfg label{font-weight:600;color:var(--ink-light,#6b5f48);display:block;margin-top:4px}
#ai-chat-panel .ac-cfg input{width:100%;margin:2px 0 5px;padding:6px 8px;border:1px solid var(--card-border,#e5d5b5);border-radius:4px;font-size:.85em;background:var(--card-bg,#fef9ee);color:var(--ink,#3d3525);outline:none}
#ai-chat-panel .ac-cfg .ac-row{display:flex;gap:8px;align-items:center}
#ai-chat-panel .ac-cfg .ac-row input{flex:1;margin:2px 0}
#ai-chat-panel .ac-cfg .ac-btn{padding:6px 14px;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.82em;font-weight:600}
#ai-chat-panel .ac-cfg .ac-save{background:var(--accent,#2d7fc1)}
#ai-chat-panel .ac-cfg .ac-clear{background:#888}
#ai-chat-panel .ac-cfg .ac-note{margin:6px 0 0;font-size:.75em;color:var(--ink-light,#6b5f48)}
#ai-chat-panel .ac-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
#ai-chat-panel .ac-msgs .msg{max-width:92%;padding:8px 12px;border-radius:8px;font-size:.85em;line-height:1.6;word-break:break-word}
#ai-chat-panel .ac-msgs .msg.user{align-self:flex-end;background:var(--accent,#2d7fc1);color:#fff}
#ai-chat-panel .ac-msgs .msg.bot{align-self:flex-start;background:var(--code-bg,#ede0c5);color:var(--ink,#3d3525)}
#ai-chat-panel .ac-input-wrap{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--divider,#d9c9a0);flex-shrink:0}
#ai-chat-panel .ac-input-wrap textarea{flex:1;padding:8px 10px;border:1px solid var(--card-border,#e5d5b5);border-radius:6px;resize:none;font-size:.85em;line-height:1.5;background:var(--card-bg,#fef9ee);color:var(--ink,#3d3525);outline:none;max-height:80px;font-family:inherit}
#ai-chat-panel .ac-input-wrap button{padding:8px 14px;background:var(--accent,#2d7fc1);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85em;white-space:nowrap}
#ai-chat-panel .ac-input-wrap button:disabled{opacity:.5;cursor:not-allowed}
@media print{#ai-chat-panel,#ai-chat-toggle{display:none!important}}
@media(max-width:768px){#ai-chat-panel{width:100vw}}
</style>
<div id="ai-chat-panel">
  <div class="ac-header"><span>AI 学习助手</span><button onclick="document.getElementById('ai-chat-panel').style.display='none';document.getElementById('ai-chat-toggle').classList.remove('active');document.body.classList.remove('ai-chat-open')">×</button></div>
  <div class="ac-cfg">
    <label>API Key <span style="font-weight:400;font-size:.9em">🔒 仅存你本地</span></label>
    <input type="password" id="api-key" placeholder="sk-...">
    <label>Base URL <span style="font-weight:400;font-size:.9em">(默认 OpenAI)</span></label>
    <input type="text" id="api-base" placeholder="https://api.openai.com/v1">
    <div class="ac-row"><input type="text" id="api-model" placeholder="模型: gpt-4o"><button class="ac-btn ac-save" id="save-config">保存</button><button class="ac-btn ac-clear" id="clear-config">清除</button></div>
    <p class="ac-note">🔒 Key仅保存在你浏览器本地，其他用户无法看到。</p>
  </div>
  <div class="ac-msgs" id="chat-msgs"><div class="msg bot">👋 你好！我是数学建模AI助教，已学习本网站全部知识点（插值与拟合、蒙特卡洛、线性回归、AI与建模竞赛策略）。<br><br>请先在上方输入你的 API Key 并保存，然后开始提问。</div></div>
  <div class="ac-input-wrap"><textarea id="chat-input" rows="1" placeholder="输入问题，回车发送..."></textarea><button id="chat-send">发送</button></div>
</div>
